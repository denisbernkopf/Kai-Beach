const GO_W = 240, GO_H = 136;

// ── COLLECTIBLE HEARTS ──────────────────────────────────
// Hearts appear in the sand at doubling intervals
// First heart at 800 world-units ahead, then 1600, 3200, 6400 …
let collectHearts = [];   // {wx, collected}
let nextHeartWx = 800;    // world-x of next heart to spawn
let nextHeartGap = 800;   // doubles each time
function spawnCollectHeart() {
  collectHearts.push({ wx: nextHeartWx, collected: false });
  nextHeartWx += nextHeartGap;
  nextHeartGap *= 2;
}
spawnCollectHeart(); // place first one
const CAM_X = GW*0.40, BG_W = 1024;

// ── UPDATE ──────────────────────────────────────────────
function resetGame() {
  scrollX = 0; score = 0; lives = 5; gameOver = false; gameOverTimer = 0; paused = false;
  scorePop = 0; livesPop = 0;
  P.x = GW*0.40; P.y = GROUND_Y; P.vx = 0; P.vy = 0;
  P.onGround = true; P.right = true; P.frame = 0;
  P.hurt = false; P.hurtTimer = 0; P.invincible = false; P.invincibleTimer = 0;
  P.wasAirborne = false;
  crabs.length = 0; enemyIndex = 0;
  for (let i = 0; i < 6; i++) crabs.push(makeEnemy(GW + 100 + i * CRAB_GAP, enemyIndex++));
  collectHearts.length = 0; nextHeartWx = 800; nextHeartGap = 800;
  spawnCollectHeart();
}

function update(dt) {
  // ── Paused state ─────────────────────────────────────
  if (paused) {
    if (K['Space']) { K['Space'] = false; paused = false; }
    return;
  }

  // ── Game Over state ──────────────────────────────────
  if (gameOver) {
    gameOverTimer += dt;
    // Only accept Space to restart after grace period AND key was freshly pressed
    if (gameOverTimer >= GAME_OVER_GRACE && K['Space']) {
      K['Space'] = false;
      resetGame();
    }
    return;
  }
  // ── Player ──────────────────────────────────────────
  const left   = K['ArrowLeft']  || K['KeyA'];
  const right  = K['ArrowRight'] || K['KeyD'];
  const shift  = K['ShiftLeft']  || K['ShiftRight'];
  const jump   = K['Space'] || K['ArrowUp'] || K['KeyW'];

  // Tick damage timers
  if (P.hurt) {
    P.hurtTimer -= dt;
    if (P.hurtTimer <= 0) { P.hurt = false; }
  }
  if (P.invincible) {
    P.invincibleTimer -= dt;
    if (P.invincibleTimer <= 0) { P.invincible = false; }
  }

  if (!P.hurt) {
    // Normal input only when not in knockback
    const moving = left || right;
    const sprint = moving && shift;
    if (right)     { P.vx =  sprint ? RUN_SPD : WALK_SPD; P.right=true;  }
    else if (left) { P.vx = -(sprint ? RUN_SPD : WALK_SPD); P.right=false; }
    else P.vx = 0;

    if (jump && P.onGround) {
      P.vy = sprint ? SPRINT_JUMP_VEL : JUMP_VEL;
      P.sprintJumping = sprint; P.onGround = false;
    }
  }

  const grav = (!P.onGround && P.sprintJumping) ? SPRINT_JUMP_GRAV : GRAVITY;
  P.vy += grav*dt; P.x += P.vx*dt; P.y += P.vy*dt;
  if (P.y >= GROUND_Y) { P.y=GROUND_Y; P.vy=0; P.onGround=true; P.sprintJumping=false; }

  // Track airborne state BEFORE clamping scroll (used for crab scoring)
  P.wasAirborne = !P.onGround;

  if      (P.x > CAM_X) { scrollX += P.x-CAM_X; P.x=CAM_X; }
  else if (P.x < CAM_X) {
    const delta = CAM_X - P.x;
    // Fix: clamp scrollX so player can't walk past world origin
    const newScroll = scrollX - delta;
    if (newScroll < 0) { P.x = CAM_X - scrollX; scrollX = 0; }
    else { scrollX = newScroll; P.x = CAM_X; }
  }

  // Dog animation — freeze on jump-down frame during knockback
  if (P.hurt) {
    P.frame = 7; // jump-down / tumble pose
  } else if (!P.onGround) {
    P.frame = P.vy < 0 ? 6 : 7; P.animTimer=0;
  } else {
    const moving = left || right;
    const sprint = moving && shift;
    if (moving) {
      const frames = sprint ? [4,5] : [1,2,3];
      const dur    = sprint ? RUN_DUR : WALK_DUR;
      const inRun  = P.frame===4 || P.frame===5;
      const inWalk = P.frame>=1 && P.frame<=3;
      if (sprint && !inRun)   { P.animStep=0; P.animTimer=0; }
      if (!sprint && !inWalk) { P.animStep=0; P.animTimer=0; }
      P.animTimer += dt;
      if (P.animTimer >= dur) { P.animTimer -= dur; P.animStep=(P.animStep+1)%frames.length; }
      P.frame = frames[P.animStep];
    } else {
      P.frame=0; P.animTimer=0; P.animStep=0;
    }
  }

  // ── Crabs ───────────────────────────────────────────
  // Speed scales up 10% every 20 points, capped at MAX_SPEED_TIER
  const tier = Math.min(Math.floor(score / 20), MAX_SPEED_TIER);
  const speedMult = Math.pow(1.10, tier);

  // Move every crab left in world space
  for (const c of crabs) {
    c.wx -= (c.isCrab ? CRAB_SPD : GULL_SPD) * speedMult * dt;
    c.animTimer += dt;
    const dur = c.isCrab ? CRAB_ANIM_DUR : GULL_ANIM_DUR;
    if (c.animTimer >= dur) { c.animTimer -= dur; c.animFrame = 1 - c.animFrame; }

    // Score logic — check when enemy passes Kai's position
    if (!c.scored) {
      const csx = c.wx - scrollX;
      const psx = P.x;

      if (c.isCrab) {
        // Award point when crab passes Kai AND Kai was airborne this frame.
        // wasAirborne is set before scroll update, so it reliably captures the
        // full arc of the jump — including frames after landing but still crossing.
        if (csx < psx && P.wasAirborne) {
          c.scored = true;
          score++;
          scorePop = 1;
        }
      } else {
        // Seagull: award when it passes Kai regardless of jump (surviving scores)
        if (csx < psx) {
          c.scored = true;
          score++;
          scorePop = 1;
        }
      }
    }
  }

  // Remove enemies that have scrolled well off the left of the screen
  crabs = crabs.filter(c => c.wx > scrollX - 120);

  // ── Collision detection ─────────────────────────────
  if (!P.invincible) {
    const psx = P.x; // Kai's screen x (fixed at CAM_X mostly)
    const psy = P.y; // Kai's world y (feet)
    const PHW = DEST_W * 0.35; // Kai half-width hitbox (tighter than sprite)
    const PHH = DEST_H * 0.75; // Kai hitbox height

    for (const c of crabs) {
      const csx = c.wx - scrollX; // enemy screen x
      if (c.isCrab) {
        const EHW = CRAB_DEST_W * 0.4;
        const EHH = CRAB_DEST_H;
        const overlapX = Math.abs(psx - csx) < PHW + EHW;
        const cTop = GROUND_Y - EHH;
        const overlapY = psy - PHH < GROUND_Y && psy > cTop;
        if (overlapX && overlapY) {
          // Hit! Knock Kai back away from crab
          P.hurt = true; P.hurtTimer = P.HURT_DURATION;
          P.invincible = true; P.invincibleTimer = P.INVINCIBLE_DURATION;
          P.vx = (psx < csx ? -1 : 1) * 280; // knock away
          P.vy = -220; P.onGround = false;
          c.scored = true; // prevent scoring this enemy after being hit by it
          lives = Math.max(0, lives - 1); livesPop = 1;
          break;
        }
      } else {
        // Seagull — hitbox at its flight altitude
        const gTop = GROUND_Y - GULL_ALT - GULL_DEST_H;
        const gBot = GROUND_Y - GULL_ALT;
        const EHW = GULL_DEST_W * 0.4;
        const overlapX = Math.abs(psx - csx) < PHW + EHW;
        // Kai's head top when jumping
        const kaiTop = psy - PHH;
        const overlapY = kaiTop < gBot && psy > gTop;
        if (overlapX && overlapY) {
          P.hurt = true; P.hurtTimer = P.HURT_DURATION;
          P.invincible = true; P.invincibleTimer = P.INVINCIBLE_DURATION;
          P.vx = (psx < csx ? -1 : 1) * 280;
          P.vy = -220; P.onGround = false;
          c.scored = true; // prevent scoring this enemy after being hit by it
          lives = Math.max(0, lives - 1); livesPop = 1;
          break;
        }
      }
    }
  }

  // Keep pipeline full: if the rightmost crab is now within 2 gaps of the right
  // screen edge, add another one beyond it
  const rightmost = crabs.reduce((max, c) => Math.max(max, c.wx), scrollX);
  if (rightmost < scrollX + GW + CRAB_GAP) {
    crabs.push(makeEnemy(rightmost + CRAB_GAP, enemyIndex++));
  }

  // ── Collectible hearts ───────────────────────────────
  // Spawn next heart only if it hasn't been placed yet and player is approaching
  if (collectHearts.length === 0 || collectHearts[collectHearts.length-1].wx === nextHeartWx - nextHeartGap/2) {
    // already spawned — do nothing
  }
  while (nextHeartWx < scrollX + GW * 2) spawnCollectHeart();

  // Check pickup collision (touch ground-level heart)
  const CHW = HEART_W;
  for (const h of collectHearts) {
    if (h.collected) continue;
    const hsx = h.wx - scrollX;
    if (hsx < -30 || hsx > GW + 30) continue;
    const overlapX = Math.abs(P.x - hsx) < CHW + 8;
    const overlapY = P.y > GROUND_Y - 20;
    if (overlapX && overlapY) {
      h.collected = true;
      if (lives < 5) {
        lives = Math.min(5, lives + 1);
        livesPop = 1;
      }
      // Always show a score pop as "collected" feedback even at full health
      scorePop = Math.max(scorePop, 0.5);
    }
  }
  // Cull hearts far behind
  collectHearts = collectHearts.filter(h => h.wx > scrollX - 60);

  // ── Game Over trigger ───────────────────────────────
  // Trigger immediately when lives reach 0 so it fires in the same frame as the hit
  if (lives <= 0 && !gameOver) {
    lives = 0;
    gameOver = true;
    gameOverTimer = 0;
  }
}

// ── DRAW BG ─────────────────────────────────────────────
function drawBg() {
  if (!bgImg.complete||!bgImg.naturalWidth) { ctx.fillStyle='#5BC8D8'; ctx.fillRect(0,0,GW,GH); return; }
  ctx.imageSmoothingEnabled=false;
  const off  = ((scrollX)%BG_W+BG_W)%BG_W;
  const srcW = GW*(BG_W/GW);
  if (off+srcW<=BG_W) {
    ctx.drawImage(bgImg,off,0,srcW,bgImg.naturalHeight,0,0,GW,GH);
  } else {
    const w1=BG_W-off, dw1=Math.round(GW*w1/srcW);
    ctx.drawImage(bgImg,off,0,w1,     bgImg.naturalHeight,0,  0,dw1,   GH);
    ctx.drawImage(bgImg,0, 0,srcW-w1, bgImg.naturalHeight,dw1,0,GW-dw1,GH);
  }
}

// ── DRAW DOG ────────────────────────────────────────────
const offCanvas = document.createElement('canvas');
offCanvas.width  = Math.ceil(DEST_W);
offCanvas.height = Math.ceil(DEST_H * 1.2); // a bit taller to cover all frames
const offCtx = offCanvas.getContext('2d');

function drawDog() {
  if (!sheet.complete||!sheet.naturalWidth) return;

  // Flicker during invincibility (skip every other 0.1s window)
  if (P.invincible && Math.floor(P.invincibleTimer / 0.1) % 2 === 0) return;

  const fi    = P.frame;
  const destY = Math.round(P.y - DEST_H*(FEET_ROW[fi]/FRAME_H));
  const destX = Math.round(P.x - DEST_W/2);

  const flashT = P.hurt
    ? P.hurtTimer / P.HURT_DURATION
    : P.invincible
      ? Math.max(0, (P.invincibleTimer - P.INVINCIBLE_DURATION * 0.6) / (P.INVINCIBLE_DURATION * 0.4))
      : 0;

  ctx.save();
  if (!P.right) { ctx.translate(Math.round(P.x),0); ctx.scale(-1,1); ctx.translate(-Math.round(P.x),0); }
  ctx.imageSmoothingEnabled = false;

  if (flashT > 0) {
    // Draw sprite into offscreen canvas
    offCtx.clearRect(0, 0, offCanvas.width, offCanvas.height);
    offCtx.imageSmoothingEnabled = false;
    offCtx.drawImage(sheet, fi*FRAME_W, 0, FRAME_W, FRAME_H, 0, 0, DEST_W, DEST_H);
    // Paint red only over the sprite's own pixels
    offCtx.globalCompositeOperation = 'source-atop';
    offCtx.fillStyle = `rgba(255, 40, 40, ${flashT * 0.6})`;
    offCtx.fillRect(0, 0, offCanvas.width, offCanvas.height);
    offCtx.globalCompositeOperation = 'source-over';
    // Stamp the tinted sprite onto the main canvas
    ctx.drawImage(offCanvas, destX, destY);
  } else {
    ctx.drawImage(sheet, fi*FRAME_W, 0, FRAME_W, FRAME_H, destX, destY, DEST_W, DEST_H);
  }

  ctx.restore();
}

// ── DRAW ENEMIES ────────────────────────────────────────
function drawCrabs() {
  for (const c of crabs) {
    ctx.save();
    ctx.imageSmoothingEnabled = false;
    if (c.isCrab) {
      if (!crabImg.complete||!crabImg.naturalWidth) { ctx.restore(); continue; }
      const sx = Math.round(c.wx - scrollX - CRAB_DEST_W/2);
      const sy = Math.round(c.y - CRAB_DEST_H);
      const bob = c.animFrame === 0 ? 0 : 1;
      // Mirror so claws face left (toward dog)
      ctx.translate(sx + CRAB_DEST_W/2, 0);
      ctx.scale(-1, 1);
      ctx.translate(-(sx + CRAB_DEST_W/2), 0);
      ctx.drawImage(crabImg, 0, 0, CRAB_W, CRAB_H, sx, sy+bob, CRAB_DEST_W, CRAB_DEST_H);
    } else {
      if (!gullImg.complete||!gullImg.naturalWidth) { ctx.restore(); continue; }
      // Seagull flies at jump height — ~75px above ground in game units
      const sx = Math.round(c.wx - scrollX - GULL_DEST_W/2);
      const sy = Math.round(GROUND_Y - GULL_ALT - GULL_DEST_H);
      // Seagull faces left naturally (already drawn facing left in sprite)
      ctx.drawImage(gullImg, c.animFrame * GULL_FRAME_W, 0, GULL_FRAME_W, GULL_FRAME_H,
                    sx, sy, GULL_DEST_W, GULL_DEST_H);
    }
    ctx.restore();
  }
}

// ── LOOP ────────────────────────────────────────────────
// ── DRAW ROCK (left boundary marker) ─────────────────────
function drawRock() {
  if (!rockImg.complete || !rockImg.naturalWidth) return;
  // Only draw when we're close enough to the start that the rock could be on screen.
  // Beyond one bg tile width it can never be visible AND the modulo would cause
  // it to reappear falsely on every subsequent tile repeat.
  const RW = Math.round(ROCK_W * 1.4);
  const RH = Math.round(ROCK_H * 1.8);
  if (scrollX > CAM_X + RW + GW) return; // well past off-screen, stop all modulo math
  const bgScale = GW / BG_W;
  const off = ((scrollX) % BG_W + BG_W) % BG_W;
  const rockBgX = CAM_X / bgScale;
  const screenX = (rockBgX - off) * bgScale;
  const drawX = Math.round(screenX) - RW;
  const drawY = GROUND_Y - RH;
  if (drawX > GW || drawX + RW < 0) return;
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  ctx.drawImage(rockImg, drawX, drawY, RW, RH);
  ctx.restore();
}

// ── DRAW SCORE ───────────────────────────────────────────
function drawScore() {
  scorePop = Math.max(0, scorePop - 0.08);
  const scale = 1 + scorePop * 0.35;
  const label = String(score);
  const px = 16;
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  ctx.font = `bold ${Math.round(px * scale)}px monospace`;
  ctx.textAlign = 'right';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.fillText(label, GW - 7 + 1, 8 + 1);
  ctx.fillStyle = scorePop > 0 ? '#7fff54' : '#ffffff';
  ctx.fillText(label, GW - 7, 8);


  ctx.restore();
}

// ── DRAW LIVES ───────────────────────────────────────────
function drawLives() {
  livesPop = Math.max(0, livesPop - 0.08);
  ctx.save();
  ctx.imageSmoothingEnabled = false;

  const HW = HEART_W;      // 1× — 50% smaller than the previous 2× size
  const HH = HEART_H;
  const GAP = 3;
  const startX = 5;
  const startY = 6;

  for (let i = 0; i < 5; i++) {
    const x = startX + i * (HW + GAP);
    if (i < lives) {
      if (livesPop > 0 && i === lives - 1) {
        const pop = 1 + livesPop * 0.3;
        const offW = HW * (pop - 1) / 2;
        const offH = HH * (pop - 1) / 2;
        ctx.drawImage(heartImg, x - offW, startY - offH, HW * pop, HH * pop);
      } else {
        ctx.drawImage(heartImg, x, startY, HW, HH);
      }
    } else {
      ctx.globalAlpha = 0.22;
      ctx.drawImage(heartImg, x, startY, HW, HH);
      ctx.globalAlpha = 1;
    }
  }
  ctx.restore();
}

// ── DRAW COLLECTIBLE HEARTS ───────────────────────────────
function drawCollectHearts() {
  ctx.save();
  ctx.imageSmoothingEnabled = false;
  const HW = HEART_W, HH = HEART_H; // 1× in world
  for (const h of collectHearts) {
    if (h.collected) continue;
    const sx = h.wx - scrollX;
    if (sx < -HW || sx > GW + HW) continue;
    // Gentle bob animation using scrollX as a time proxy
    const bob = Math.sin(scrollX * 0.04 + h.wx * 0.01) * 1.5;
    const drawY = GROUND_Y - HH - 4 + bob;
    ctx.drawImage(heartImg, sx - HW/2, drawY, HW, HH);
    // Little sparkle glow
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#ff6677';
    ctx.beginPath();
    ctx.arc(sx, drawY + HH/2, HW * 0.7, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
    // Redraw heart on top of glow
    ctx.drawImage(heartImg, sx - HW/2, drawY, HW, HH);
  }
  ctx.restore();
}

// ── DRAW GAME OVER ────────────────────────────────────────
function drawGameOver() {
  ctx.save();
  ctx.imageSmoothingEnabled = false;

  const centreX = GW / 2;
  const centreY = GH / 2;
  const goX = (GW - GO_W) / 2;
  const goY = centreY - GO_H / 2 - 8;
  const scoreY = goY - 20;

  // ── 1. Score — drawn BEFORE the overlay so it sits above the game world ──
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillText(`SCORE: ${score}`, centreX + 1, scoreY + 1);
  ctx.fillStyle = '#ffe066';
  ctx.fillText(`SCORE: ${score}`, centreX, scoreY);

  // ── 2. Dark overlay ──────────────────────────────────────────────────────
  ctx.fillStyle = 'rgba(0,0,0,0.60)';
  ctx.fillRect(0, 0, GW, GH);

  // ── 3. Score again on top of overlay (same position, same text) ──────────
  ctx.fillStyle = 'rgba(0,0,0,0.75)';
  ctx.fillText(`SCORE: ${score}`, centreX + 1, scoreY + 1);
  ctx.fillStyle = '#ffe066';
  ctx.fillText(`SCORE: ${score}`, centreX, scoreY);

  // ── 4. GAME OVER graphic ─────────────────────────────────────────────────
  ctx.drawImage(gameOverImg, goX, goY, GO_W, GO_H);

  // ── 5. Pulsing restart prompt (only after grace period) ──────────────────
  if (gameOverTimer >= GAME_OVER_GRACE) {
    ctx.font = 'bold 9px monospace';
    ctx.textBaseline = 'top';
    const pulse = 0.55 + 0.45 * Math.abs(Math.sin(Date.now() / 420));
    ctx.globalAlpha = pulse;
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillText('PRESS SPACE TO PLAY AGAIN', centreX + 1, goY + GO_H + 9 + 1);
    ctx.fillStyle = '#ffffff';
    ctx.fillText('PRESS SPACE TO PLAY AGAIN', centreX, goY + GO_H + 9);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

// ── DRAW PAUSED ───────────────────────────────────────────
function drawPaused() {
  ctx.save();
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.fillRect(0, 0, GW, GH);
  ctx.imageSmoothingEnabled = false;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  // "PAUSED"
  ctx.font = 'bold 22px monospace';
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillText('PAUSED', GW/2 + 2, GH/2 - 10 + 2);
  ctx.fillStyle = '#ffffff';
  ctx.fillText('PAUSED', GW/2, GH/2 - 10);
  // Resume hint
  const pulse = 0.55 + 0.45 * Math.abs(Math.sin(Date.now() / 420));
  ctx.globalAlpha = pulse;
  ctx.font = 'bold 9px monospace';
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillText('PRESS SPACE TO CONTINUE', GW/2 + 1, GH/2 + 14 + 1);
  ctx.fillStyle = '#ffe066';
  ctx.fillText('PRESS SPACE TO CONTINUE', GW/2, GH/2 + 14);
  ctx.globalAlpha = 1;
  ctx.restore();
}

function loop(ts) {
  const dt=Math.min((ts-lastT)/1000,0.05); lastT=ts;
  update(dt);
  ctx.clearRect(0,0,GW,GH);
  drawBg();
  drawRock();
  drawCollectHearts();
  drawCrabs();
  drawDog();
  drawScore();
  drawLives();
  if (paused) drawPaused();
  if (gameOver) drawGameOver();
  requestAnimationFrame(loop);
}
requestAnimationFrame(ts=>{ lastT=ts; requestAnimationFrame(loop); });
</script>
</body>
</html>
